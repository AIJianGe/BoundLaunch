schema_version = 1

[paths]
comfyui_root = 'D:\AIWork\myComfyui/ComfyUI'
venv_path = 'D:\AIWork\myComfyui\data\venv'
python_version = "3.11"

[launch]
mode = "gpu_high"
listen_host = "127.0.0.1"
listen_port = 8188
auto_open_browser = true
preview_method = "latent2rgb"
custom_args = ""

[launch.advanced]
use_split_cross_attention = false
use_pytorch_cross_attention = false
force_fp32 = false
fp16_vae = false
bf16_vae = false
no_half = false
no_half_vae = false
directml = false

[torch]
cuda_version = "cu128"

[models]
mode = "default"
custom_root = ""

[models.advanced]

[ui]
theme = "auto"
language = "zh-CN"
auto_check_update = true
minimize_to_tray = true
